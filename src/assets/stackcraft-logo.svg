<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rounded blue square background (like LinkedIn) -->
  <rect width="100" height="100" rx="20" fill="#3B6DF0"/>
  <!-- Top layer (solid white diamond) -->
  <path d="M50 22 L78 36.5 L50 51 L22 36.5 Z" fill="white"/>
  <!-- Mid layer -->
  <path d="M22 48 L50 62.5 L78 48" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Bottom layer -->
  <path d="M22 60 L50 74.5 L78 60" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
</svg>
